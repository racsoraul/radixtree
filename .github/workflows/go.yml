name: Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.2
    - uses: actions/setup-go@v6.2.0
      with:
        go-version: '1.25'

    - name: Run Tests
      run: go test -v ./...
